<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảo Vệ Cơ Thể - Đăng Nhập</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="db.js"></script>
</head>
<body class="bg-gray-100 text-gray-800">
    <div class="max-w-md mx-auto min-h-screen bg-white shadow-lg p-6 flex flex-col justify-between">
        
        <!-- Onboarding Header -->
        <div class="text-center space-y-2">
            <span class="bg-indigo-100 text-indigo-700 text-xs px-3 py-1 rounded-full font-bold uppercase tracking-wider">Bước 3: Xác Thực</span>
            <h1 class="text-2xl font-black text-indigo-600 mt-2">BẮT ĐẦU TRẢI NGHIỆM</h1>
            <p class="text-xs text-gray-500">Đăng nhập tài khoản Google để đồng bộ dữ liệu hoặc trải nghiệm chế độ Ẩn Danh ngay.</p>
        </div>

        <!-- Login Controls -->
        <div class="space-y-3 my-6">
            <!-- Mock Google Login Button -->
            <button onclick="handleGoogleLogin()" class="w-full flex items-center justify-center space-x-3 border-2 border-gray-200 hover:border-indigo-500 py-3 rounded-xl transition-all">
                <img src="https://www.svgrepo.com/show/475656/google-color.svg" class="w-5 h-5" alt="Google">
                <span class="text-sm font-bold text-gray-700">Tiếp tục với Google</span>
            </button>

            <!-- Anonymous Login Button -->
            <button onclick="handleAnonymousLogin()" class="w-full bg-indigo-600 hover:bg-indigo-700 text-white py-3.5 rounded-xl font-bold text-sm shadow transition-all">
                Chế độ Ẩn Danh (Vào trang chủ)
            </button>
        </div>

        <!-- Chat / Mic Support Area -->
        <div class="border rounded-xl p-4 bg-gray-50 space-y-2">
            <div class="flex items-center space-x-3">
                <button onclick="triggerMic()" class="bg-red-500 hover:bg-red-600 text-white p-3 rounded-full shadow animate-pulse">
                    🎤
                </button>
                <div class="text-left">
                    <p class="text-xs font-bold text-gray-700">Trợ Lý AI Giọng Nói</p>
                    <p class="text-[10px] text-gray-500">Bạn cần tư vấn trước khi đăng nhập? Hãy chạm micro.</p>
                </div>
            </div>
            <div id="ai-response-box" class="hidden text-xs bg-white p-2.5 rounded border border-gray-100 text-gray-600"></div>
        </div>

        <p class="text-[11px] text-gray-400 text-center mt-4">Khi đăng nhập, bạn đồng ý với các Điều khoản bảo mật y tế số của chúng tôi.</p>
    </div>

    <script>
        let userInstance = null;

        async function initUserContext() {
            userInstance = await getOrCreateUser();
        }
        initUserContext();

        async function triggerMic() {
            if (!userInstance) await initUserContext();
            
            const responseBox = document.getElementById('ai-response-box');
            responseBox.classList.remove('hidden');
            responseBox.innerHTML = "<em>Đang lắng nghe...</em>";

            await startSpeechRecognition(
                userInstance.uuid,
                (speech) => {
                    responseBox.innerHTML = `🗣️ <strong>Bạn:</strong> ${speech}`;
                },
                (aiResponse) => {
                    responseBox.innerHTML += `<br>🤖 <strong>AI:</strong> ${aiResponse}`;
                }
            );
        }

        async function handleAnonymousLogin() {
            if (!userInstance) await initUserContext();
            // Just redirect to index.html with existing/new UUID setup
            window.location.href = 'index.html';
        }

        async function handleGoogleLogin() {
            if (!userInstance) await initUserContext();

            // Simulate Google OAuth response
            const googleMockEmail = "user." + Math.floor(Math.random() * 1000) + "@gmail.com";
            const googleMockAvatar = "https://api.dicebear.com/7.x/adventurer/svg?seed=" + googleMockEmail;

            // Save details to IndexedDB under the UUID primary key
            userInstance.email = googleMockEmail;
            userInstance.avatar = googleMockAvatar;
            await saveUser(userInstance);

            alert("Đăng nhập bằng Google thành công!\nChào mừng: " + googleMockEmail);
            
            // Redirect to Game Portal
            window.location.href = 'portal-index.html';
        }
    </script>
</body>
</html>
