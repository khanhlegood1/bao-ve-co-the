<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảo Vệ Cơ Thể - Chọn Vai Trò</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="db.js"></script>
</head>
<body class="bg-blue-50 text-gray-800">
    <div class="max-w-md mx-auto min-h-screen bg-white shadow-lg p-6 flex flex-col justify-between">
        
        <!-- Onboarding Header -->
        <div class="text-center space-y-2">
            <span class="bg-blue-100 text-blue-700 text-xs px-3 py-1 rounded-full font-bold uppercase tracking-wider">Bước 1: Vai Trò</span>
            <h1 class="text-2xl font-black text-blue-600 mt-2">BẠN LÀ AI?</h1>
            <p class="text-xs text-gray-500">Hãy chọn đúng vai trò của bạn để AI tối ưu hóa lộ trình chăm sóc cơ thể.</p>
        </div>

        <!-- Role Selection -->
        <div class="space-y-4 my-6">
            <label class="flex items-center p-4 border-2 border-blue-500 rounded-xl bg-blue-50/50 cursor-pointer hover:bg-blue-50">
                <input type="radio" name="role" value="user" checked class="w-5 h-5 text-blue-600 mr-3">
                <div>
                    <p class="text-sm font-bold text-gray-800">Người tìm kiếm sức khỏe</p>
                    <p class="text-xs text-gray-500">Muốn chăm sóc bản thân, phòng tránh bệnh lý.</p>
                </div>
            </label>

            <label class="flex items-center p-4 border-2 border-gray-200 rounded-xl cursor-pointer hover:bg-gray-50">
                <input type="radio" name="role" value="doctor" class="w-5 h-5 text-blue-600 mr-3">
                <div>
                    <p class="text-sm font-bold text-gray-800">Chuyên gia / Bác sĩ</p>
                    <p class="text-xs text-gray-500">Muốn đóng góp kiến thức và tư vấn cộng đồng.</p>
                </div>
            </label>
        </div>

        <!-- Chat / Mic Support Area -->
        <div class="border rounded-xl p-4 bg-gray-50 space-y-2">
            <div class="flex items-center space-x-3">
                <button onclick="triggerMic()" class="bg-red-500 hover:bg-red-600 text-white p-3 rounded-full shadow animate-pulse">
                    🎤
                </button>
                <div class="text-left">
                    <p class="text-xs font-bold text-gray-700">Trợ Lý AI Giọng Nói</p>
                    <p class="text-[10px] text-gray-500">Chạm micro để hỏi AI ngay tại bước này.</p>
                </div>
            </div>
            <div id="ai-response-box" class="hidden text-xs bg-white p-2.5 rounded border border-gray-100 text-gray-600"></div>
        </div>

        <!-- Continue Button -->
        <button onclick="nextStep()" class="w-full bg-blue-600 hover:bg-blue-700 text-white py-3.5 rounded-xl font-bold text-sm shadow transition-all mt-4">
            Tiếp Tục ➜
        </button>
    </div>

    <script>
        let userInstance = null;

        async function initUserContext() {
            userInstance = await getOrCreateUser();
        }
        initUserContext();

        async function triggerMic() {
            if (!userInstance) await initUserContext();
            
            const responseBox = document.getElementById('ai-response-box');
            responseBox.classList.remove('hidden');
            responseBox.innerHTML = "<em>Đang lắng nghe...</em>";

            await startSpeechRecognition(
                userInstance.uuid,
                (speech) => {
                    responseBox.innerHTML = `🗣️ <strong>Bạn:</strong> ${speech}`;
                },
                (aiResponse) => {
                    responseBox.innerHTML += `<br>🤖 <strong>AI:</strong> ${aiResponse}`;
                }
            );
        }

        function nextStep() {
            window.location.href = 'DonationHeroPanel.html';
        }
    </script>
</body>
</html>
