<!DOCTYPE html>
<html lang="vi">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title data-i18n="portal-title">Cổng Game Giáo Dục</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>
  <div class="container">
    <header>
      <h1 data-i18n="portal-title">Cổng Game Giáo Dục</h1>
      <p data-i18n="portal-subtitle">Chọn một trò chơi bên dưới để bắt đầu học</p>
    </header>

    <main class="games-grid">
      <div class="game-card">
        <h3 data-i18n="game-1-title">Trò chơi: Vùng An Toàn</h3>
        <p data-i18n="game-1-desc">Tìm hiểu về các vùng nhạy cảm trên cơ thể và cách bảo vệ chúng.</p>
        <button class="btn btn-primary" data-i18n="btn-play">Chơi Ngay</button>
      </div>

      <div class="game-card">
        <h3 data-i18n="game-2-title">Trò chơi: Nhận Biết Kẻ Xấu</h3>
        <p data-i18n="game-2-desc">Học cách nhận biết các hành vi nguy hiểm từ người lạ.</p>
        <button class="btn btn-primary" data-i18n="btn-play">Chơi Ngay</button>
      </div>
    </main>

    <div class="actions">
      <a href="index.html" class="btn btn-secondary" data-i18n="btn-back">Quay Lại</a>
    </div>

    <footer>
      <p data-i18n="footer-text">© 2024 Dự án Giáo dục Bảo Vệ Cơ Thể.</p>
    </footer>
  </div>

  <script src="js/i18n.js"></script>
</body>
</html>
